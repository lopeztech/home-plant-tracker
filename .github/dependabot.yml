version: 2

updates:
  # Frontend dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Australia/Sydney
    open-pull-requests-limit: 10
    labels:
      - dependencies
    ignore:
      # uuid v9+ is pinned transitively by @google-cloud/storage, exceljs, cloudevents
      # to ^8.x — Dependabot can't resolve major bumps until those loosen.
      - dependency-name: "uuid"
        update-types: ["version-update:semver-major"]

  # Backend Cloud Function dependencies
  - package-ecosystem: npm
    directory: /api/plants
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Australia/Sydney
    open-pull-requests-limit: 10
    labels:
      - dependencies
    ignore:
      - dependency-name: "uuid"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Australia/Sydney
    labels:
      - dependencies
