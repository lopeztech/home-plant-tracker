name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install API dependencies
        run: npm ci
        working-directory: api/plants

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: api/plants

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  deploy-function:
    name: Deploy Cloud Function
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.HPT_FUNCTION_WIF_PROVIDER }}
          service_account: ${{ secrets.HPT_FUNCTION_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Package Cloud Function
        run: |
          ZIP_NAME="plants-${{ github.sha }}.zip"
          cd api/plants
          zip -r "../../${ZIP_NAME}" . \
            --exclude "node_modules/*" \
            --exclude "fixtures/*" \
            --exclude "integration/*" \
            --exclude "*.test.*" \
            --exclude "vitest.config.*"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload to GCS
        run: gsutil cp "${{ env.ZIP_NAME }}" gs://${{ secrets.FUNCTION_SOURCE_BUCKET }}/${{ env.ZIP_NAME }}

      - name: Persist latest source object name
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_INFRA_TOKEN }}
        run: |
          gh secret set HOME_PLANT_TRACKER_FUNCTION_SOURCE_OBJECT \
            --repo lopeztech/platform-infra \
            --body "${{ env.ZIP_NAME }}"

      - name: Trigger platform-infra Terraform apply
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_INFRA_TOKEN }}
        run: |
          gh workflow run home-plant-tracker-apply.yml \
            --repo lopeztech/platform-infra \
            --field function_source_object=${{ env.ZIP_NAME }}

  verify-function:
    name: Verify Cloud Function
    runs-on: ubuntu-latest
    needs: deploy-function
    if: github.event_name != 'pull_request'

    steps:
      - name: Wait for Terraform apply to complete
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_INFRA_TOKEN }}
        run: |
          echo "Waiting for platform-infra apply to finish..."
          for i in $(seq 1 30); do
            sleep 20
            STATUS=$(gh run list --repo lopeztech/platform-infra --workflow="home-plant-tracker-apply.yml" --limit 1 --json status,conclusion -q '.[0].status' 2>/dev/null || echo "unknown")
            echo "  Attempt $i: $STATUS"
            if [[ "$STATUS" == "completed" ]]; then
              CONCLUSION=$(gh run list --repo lopeztech/platform-infra --workflow="home-plant-tracker-apply.yml" --limit 1 --json conclusion -q '.[0].conclusion' 2>/dev/null)
              echo "  Conclusion: $CONCLUSION"
              if [[ "$CONCLUSION" == "success" ]]; then
                echo "Terraform apply succeeded"
                break
              else
                echo "::warning::Terraform apply finished with: $CONCLUSION"
                break
              fi
            fi
          done

      - name: Verify function serves real code
        run: |
          echo "Checking health endpoint..."
          for i in $(seq 1 5); do
            RESPONSE=$(curl -s "${{ secrets.VITE_API_BASE_URL }}/health" 2>/dev/null || echo "")
            echo "  Attempt $i: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "Cloud Function is serving real code"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Cloud Function is NOT serving real code — may be running placeholder"
          exit 1

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    env:
      APP_NAME: plant-tracker

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.ARTIFACT_REGISTRY_REPO }}/${{ env.APP_NAME }}:${{ github.sha }},${{ secrets.ARTIFACT_REGISTRY_REPO }}/${{ env.APP_NAME }}:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_API_KEY=${{ secrets.VITE_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy plant-tracker \
            --image ${{ secrets.ARTIFACT_REGISTRY_REPO }}/plant-tracker:${{ github.sha }} \
            --region ${{ secrets.CLOUD_RUN_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache \
            plant-tracker-url-map-${{ vars.ENVIRONMENT || 'dev' }} \
            --path "/*" \
            --global \
            --async
