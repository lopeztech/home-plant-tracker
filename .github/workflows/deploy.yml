name: Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Serialise per-ref. On main, rapid-fire merges would otherwise overlap deploys,
# leaving the post-deploy Playwright smoke loading an index.html whose lazy
# chunks were already replaced by a newer deploy in flight (MIME=text/html on
# the missing chunk → SPA-rewrite to index.html → "Failed to load module
# script"). Cancel-in-progress is safe because Firebase Hosting deploys are
# atomic; killing mid-upload just discards the unfinished version.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'api/plants/**'

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install API dependencies
        run: npm ci
        working-directory: api/plants

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: api/plants

      - name: Lint backend
        run: npm run lint
        working-directory: api/plants

      - name: Run backend tests with coverage
        run: npm run test:coverage
        working-directory: api/plants

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7


  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Cache Playwright browsers. Keyed on the @playwright/test version from
      # package-lock so a dep bump invalidates the cache.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # System libraries (libwoff2dec, libgstreamer-plugins-bad, etc.) are
      # NOT part of the cached browser bundle — they live in /usr via apt and
      # disappear between cache-hit runs. Install them every time, not just
      # on cache miss, otherwise WebKit fails to launch with
      # "libwoff2dec.so.1.0.2: cannot open shared object file".
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium webkit firefox

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium webkit firefox

      # Build with dummy VITE_* values — the smoke test runs in guest mode and
      # never hits the real API, so placeholder values are sufficient and let
      # the job run on fork PRs that can't read repo secrets.
      - name: Build frontend
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
          VITE_API_BASE_URL: https://placeholder.local
          VITE_API_KEY: placeholder-key

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright trace / screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-trace
          path: |
            test-results/
            playwright-report/
          retention-days: 7


  deploy-function:
    name: Deploy Cloud Function
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: github.event_name != 'pull_request' && needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.HPT_FUNCTION_WIF_PROVIDER }}
          service_account: ${{ secrets.HPT_FUNCTION_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Package Cloud Function
        run: |
          ZIP_NAME="plants-${{ github.sha }}.zip"
          cd api/plants
          zip -r "../../${ZIP_NAME}" . \
            --exclude "node_modules/*" \
            --exclude "fixtures/*" \
            --exclude "integration/*" \
            --exclude "*.test.*" \
            --exclude "vitest.config.*"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload to GCS
        run: gsutil cp "${{ env.ZIP_NAME }}" gs://${{ secrets.FUNCTION_SOURCE_BUCKET }}/${{ env.ZIP_NAME }}

      - name: Persist latest source object name
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_INFRA_TOKEN }}
        run: |
          gh secret set HOME_PLANT_TRACKER_FUNCTION_SOURCE_OBJECT \
            --repo lopeztech/platform-infra \
            --body "${{ env.ZIP_NAME }}"

      - name: Trigger platform-infra Terraform apply
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_INFRA_TOKEN }}
        run: |
          gh workflow run home-plant-tracker-apply.yml \
            --repo lopeztech/platform-infra \
            --field function_source_object=${{ env.ZIP_NAME }}

  verify-function:
    name: Verify Cloud Function
    runs-on: ubuntu-latest
    needs: deploy-function
    if: github.event_name != 'pull_request'

    steps:
      - name: Wait for Terraform apply to complete
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_INFRA_TOKEN }}
        run: |
          echo "Waiting for platform-infra apply to finish..."
          for i in $(seq 1 15); do
            sleep 15
            STATUS=$(gh run list --repo lopeztech/platform-infra --workflow="home-plant-tracker-apply.yml" --limit 1 --json status,conclusion -q '.[0].status' 2>/dev/null || echo "unknown")
            echo "  Attempt $i: $STATUS"
            if [[ "$STATUS" == "completed" ]]; then
              CONCLUSION=$(gh run list --repo lopeztech/platform-infra --workflow="home-plant-tracker-apply.yml" --limit 1 --json conclusion -q '.[0].conclusion' 2>/dev/null)
              echo "  Conclusion: $CONCLUSION"
              if [[ "$CONCLUSION" == "success" ]]; then
                echo "Terraform apply succeeded"
                break
              else
                echo "::warning::Terraform apply finished with: $CONCLUSION"
                break
              fi
            fi
          done

      - name: Verify function serves real code
        run: |
          echo "Checking health endpoint..."
          for i in $(seq 1 5); do
            RESPONSE=$(curl -s "${{ secrets.VITE_API_BASE_URL }}/health" 2>/dev/null || echo "")
            echo "  Attempt $i: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "Cloud Function is serving real code"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Cloud Function is NOT serving real code — may be running placeholder"
          exit 1

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.HPT_FUNCTION_WIF_PROVIDER }}
          service_account: ${{ secrets.HPT_FUNCTION_SA_EMAIL }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting:plant-tracker --project home-plant-tracker-lcd


  post-deploy-smoke:
    name: Post-deploy smoke (Playwright vs production)
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name != 'pull_request'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # System libs aren't in the browser cache — install on every run.
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium webkit firefox

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium webkit firefox

      # Give Firebase Hosting a beat to propagate the new bundle to the CDN
      # before we start hitting it. Bumped from 20s after a chunk-mismatch
      # smoke failure: the new deploy hadn't fully fanned out across edges,
      # so a fresh page load could grab one edge's index.html while a lazy
      # chunk request hit another edge serving the previous version.
      - name: Wait for deploy to propagate
        run: sleep 60

      - name: Run Playwright smoke against production
        env:
          E2E_BASE_URL: https://plants.lopezcloud.dev
        run: npm run test:e2e -- --project chromium

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: post-deploy-playwright-trace
          path: |
            test-results/
            playwright-report/
          retention-days: 7
