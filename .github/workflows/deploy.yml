name: Build & Deploy to GCS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Upload hashed assets first with long-lived cache (1 year, immutable).
      # Vite fingerprints these filenames so stale cache is never a problem.
      - name: Upload assets (immutable cache)
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist/assets
          destination: ${{ secrets.GCS_BUCKET_NAME }}/assets
          parent: false
          headers: |-
            cache-control: public, max-age=31536000, immutable

      # Upload index.html last, with no-cache so browsers always fetch the
      # latest entry point. This ensures new asset hashes are picked up.
      - name: Upload index.html (no-cache)
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist/index.html
          destination: ${{ secrets.GCS_BUCKET_NAME }}
          parent: false
          headers: |-
            cache-control: no-cache, no-store, must-revalidate

      # Invalidate Cloud CDN so edge nodes fetch the new index.html immediately.
      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache \
            plant-tracker-url-map-prod \
            --path "/*" \
            --global \
            --async
